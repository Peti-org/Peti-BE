version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: peti
      POSTGRES_USER: seller
      POSTGRES_PASSWORD: 1111
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - ./src/main/resources/db/setup/create-scheme.sql:/docker-entrypoint-initdb.d/01-init-scheme.sql
      - ./src/main/resources/db/setup/grant-permissions.sql:/docker-entrypoint-initdb.d/02-grant-permission.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    networks:
      - peti-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U seller -d peti" ]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Вимкнення SSL/Login на зараз для простоти, потім увімкнути -- додати пароль, логін
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Обмеження пам'яті, щоб не їло багато
      - cluster.name=peti-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - peti-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - peti-network

  app:
    image: peti/backend:v1.1
    container_name: peti-app
    env_file:
      - ./.env
    environment:
      # Database connection settings
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/peti
      SPRING_DATASOURCE_USERNAME: seller
      SPRING_DATASOURCE_PASSWORD: 1111
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      # Google OAuth
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      # Elasticsearch
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200

    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - peti-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  peti-network:
    driver: bridge
